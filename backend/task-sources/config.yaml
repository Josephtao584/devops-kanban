# Task Source Configuration
# Defines available adapter types for task sources
# To add support for a new system (e.g., Jira, Linear), add a new adapter type here

adapterTypes:
  - key: GITHUB
    name: GitHub Issues
    description: 从 GitHub Issues 同步任务
    configFields:
      repo:
        type: string
        required: true
        description: "仓库地址，格式为 owner/repo"
      token:
        type: string
        required: false
        description: "GitHub 个人访问令牌"
      state:
        type: string
        required: false
        description: "Issue 状态筛选：open、closed 或 all"
        default: open
      labels:
        type: array
        required: false
        description: "按标签筛选"
    request:
      baseUrl: "https://api.github.com"
      path: "/repos/{repo}/issues"
      method: GET
      headers:
        User-Agent: "DevOps-Kanban-App"
        Accept: "application/vnd.github.v3+json"
        Authorization: "token {token}"
      params:
        state: "{state}"
        labels: "{labels}"
    response:
      type: array
      path: ""  # 空路径表示根级别
    mapping:
      title: "$.title"
      description: "$.body"
      external_id: "$.id"
      external_url: "$.html_url"
      status: "$.state"
      labels: "$.labels[*].name"
      created_at: "$.created_at"
      updated_at: "$.updated_at"
    transforms:
      status:
        open: TODO
        closed: DONE
      external_id: "toString"
      labels: "arrayMap(name)"

  - key: CODEHUB
    name: CodeHub Issues
    description: 从 CodeHub Issues 同步任务
    configFields:
      project_id:
        type: string
        required: true
        description: "Project ID from CodeHub"
      token:
        type: string
        required: false
        description: "CodeHub Personal Access Token"
      baseUrl:
        type: string
        required: false
        description: "CodeHub API base URL"
        default: "https://git.com/api/v4"
    request:
      baseUrl: "{baseUrl}"
      path: "/projects/{project_id}/issues"
      method: GET
      headers:
        User-Agent: "DevOps-Kanban-App"
        Accept: "application/json"
        PRIVATE-TOKEN: "{token}"
    response:
      type: object
      path: "$.issues"
    mapping:
      title: "$.title"
      description: "$.description"
      external_id: "$.id"
      external_url: "$.project_id"
      status: "$.state"
      created_at: "$.created_at"
      updated_at: "$.updated_at"
    transforms:
      status:
        opened: TODO
        closed: DONE
      external_id: "toString"

  - key: INTERNAL_API
    name: Internal API
    description: 从内部 API 同步任务（列表 + 详情两段拉取模板）
    configFields:
      baseUrl:
        type: string
        required: true
        description: "内部 API 基础地址，例如 https://internal.example.com"
      token:
        type: string
        required: true
        description: "Authorization 请求头值"
      userId:
        type: string
        required: true
        description: "用于 mine_todo 过滤的用户标识"
      category:
        type: string
        required: false
        description: "工作项分类过滤值"
        default: "5"
        valueType: string
        options:
          - label: "Story"
            value: "5"
      status:
        type: string
        required: false
        description: "工作项状态过滤值"
        default: "131"
        valueType: number
        options:
          - label: "待处理"
            value: 131
      pageSize:
        type: string
        required: false
        description: "每页工作项数量"
        default: "10"
        hidden: true
      listPath:
        type: string
        required: true
        description: "工作项列表 API 的相对路径"
        default: /devops-workitem/api/v1/query/workitems
        hidden: true
      detailPath:
        type: string
        required: true
        description: "详情 API 的相对路径模板"
        default: /devops-workitem/api/v1/query/{number}/document_detail
        hidden: true
      detailIdField:
        type: string
        required: false
        description: "列表项中用于填充详情路径占位符的字段，默认为 number"
        default: number
        hidden: true
      rejectUnauthorized:
        type: boolean
        required: false
        description: "是否拒绝自签名证书（默认 true，设为 false 以接受自签名证书）"
        default: true

# Future adapters can be added here, e.g.:
