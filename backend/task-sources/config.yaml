# Task Source Configuration
# Defines available adapter types for task sources
# To add support for a new system (e.g., Jira, Linear), add a new adapter type here

adapterTypes:
  - key: GITHUB
    name: GitHub Issues
    description: 从 GitHub Issues 同步任务
    configFields:
      repo:
        type: string
        required: true
        description: "Repository in format owner/repo"
      token:
        type: string
        required: false
        description: "GitHub Personal Access Token"
      state:
        type: string
        required: false
        description: "Issue state filter: open, closed, or all"
        default: open
      labels:
        type: array
        required: false
        description: "Filter by labels"
    request:
      baseUrl: "https://api.github.com"
      path: "/repos/{repo}/issues"
      method: GET
      headers:
        User-Agent: "DevOps-Kanban-App"
        Accept: "application/vnd.github.v3+json"
        Authorization: "token {token}"
      params:
        state: "{state}"
        labels: "{labels}"
    response:
      type: array
      path: ""  # 空路径表示根级别
    mapping:
      title: "$.title"
      description: "$.body"
      external_id: "$.id"
      external_url: "$.html_url"
      status: "$.state"
      labels: "$.labels[*].name"
      created_at: "$.created_at"
      updated_at: "$.updated_at"
    transforms:
      status:
        open: TODO
        closed: DONE
      external_id: "toString"
      labels: "arrayMap(name)"

  - key: CODEHUB
    name: CodeHub Issues
    description: 从 CodeHub Issues 同步任务
    configFields:
      project_id:
        type: string
        required: true
        description: "Project ID from CodeHub"
      token:
        type: string
        required: false
        description: "CodeHub Personal Access Token"
      baseUrl:
        type: string
        required: false
        description: "CodeHub API base URL"
        default: "https://git.com/api/v4"
    request:
      baseUrl: "{baseUrl}"
      path: "/projects/{project_id}/issues"
      method: GET
      headers:
        User-Agent: "DevOps-Kanban-App"
        Accept: "application/json"
        PRIVATE-TOKEN: "{token}"
    response:
      type: object
      path: "$.issues"
    mapping:
      title: "$.title"
      description: "$.description"
      external_id: "$.id"
      external_url: "$.project_id"
      status: "$.state"
      created_at: "$.created_at"
      updated_at: "$.updated_at"
    transforms:
      status:
        opened: TODO
        closed: DONE
      external_id: "toString"

  - key: INTERNAL_API
    name: Internal API
    description: 从内部 API 同步任务（列表 + 详情两段拉取模板）
    configFields:
      baseUrl:
        type: string
        required: true
        description: "Internal API base URL, for example https://internal.example.com"
      token:
        type: string
        required: false
        description: "Optional bearer token or API key"
      listPath:
        type: string
        required: true
        description: "Relative path for the list API, for example /api/tasks"
      detailPath:
        type: string
        required: true
        description: "Relative path template for the detail API, for example /api/tasks/{id}"
      detailIdField:
        type: string
        required: false
        description: "Field from the list item used to fill the detail path placeholder, defaults to id"
        default: id

# Future adapters can be added here, e.g.:
#   - key: JIRA
